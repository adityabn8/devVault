name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greet the world
        run: echo "Hello, world!"
      
      - name: Push Triggered
        run: echo "This job is triggered by ${{ github_event_name }}."

      - name: Branch Name
        run: echo "Branch is ${{ github.ref_name }}."