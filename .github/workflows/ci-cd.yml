name: NODE CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.build_version.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print repo path
        run: echo "The repo in runner at ${{ github.workspace }}"

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Cache node modules
        id: client-cache
        uses: actions/cache@v4
        with:
          path: ./client/node_modules
          key: ${{ runner.os }}-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-client-

      - name: Install dependencies
        if: ${{ steps.client-cache.outputs.cache-hit != 'true' }}
        working-directory: ./client
        run: npm ci

      - name: Linting
        working-directory: ./client
        run: npm run lint
        
      - name: Building
        working-directory: ./client
        run: npm run build
      
      - name: Set version
        id: build_version
        run: echo "value=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./client/build
          retention-days: 5
  
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Caching the node modules
        id: server-cache
        uses: actions/cache@v4
        with:
          path: ./server/node_modules
          key: ${{ runner.os }}-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-server-

      - name: Install dependencies
        if: ${{ steps.server-cache.outputs.cache-hit != 'true' }}
        working-directory: ./server
        run: npm ci

      - name: Linting
        working-directory: ./server
        run: npm run lint

  deploy:
    needs: [ frontend, backend ]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./client-build
      
      - name: Verify build files exist
        run: ls -la ./client-build
      
      - name: Deploy to production
        run: echo "Deploying version ${{ needs.frontend.outputs.build_version }} to production..."

# testing the cacheed node_modules
