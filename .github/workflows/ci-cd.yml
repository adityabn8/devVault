name: NODE CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.build_version.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Cache node modules
        id: client-cache
        uses: actions/cache@v4
        with:
          path: ./client/node_modules
          key: ${{ runner.os }}-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-client-

      - name: Install dependencies
        if: ${{ steps.client-cache.outputs.cache-hit != 'true' }}
        working-directory: ./client
        run: npm ci

      - name: Linting
        working-directory: ./client
        run: npm run lint
        
      - name: Building
        working-directory: ./client
        run: npm run build
      
      - name: Set version
        id: build_version
        run: echo "value=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./client/build
          retention-days: 5
  
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Caching the node modules
        id: server-cache
        uses: actions/cache@v4
        with:
          path: ./server/node_modules
          key: ${{ runner.os }}-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-server-

      - name: Install dependencies
        if: ${{ steps.server-cache.outputs.cache-hit != 'true' }}
        working-directory: ./server
        run: npm ci

      - name: Linting
        working-directory: ./server
        run: npm run lint
  
  docker-build:
    name: Docker Build
    needs: [ frontend, backend ]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up the Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push client images
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devvault-client:latest
            ghcr.io/${{ github.repository_owner }}/devvault-client:${{ github.sha }}
          cache-from: type=gha, scope=client
          cache-to: type=gha, scope=client, mode=max
      - name: Build and push the server images
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devvault-server:latest
            ghcr.io/${{ github.repository_owner }}/devvault-server:${{ github.sha }}
          cache-from: type=gha, scope=server
          cache-to: type=gha, scope=server, mode=max
      - name: Verify images
        run: docker images ghcr.io/${{ github.repository_owner }}


  deploy:
    needs: [ frontend, backend, docker-build ]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./client-build
      
      - name: Verify build files exist
        run: ls -la ./client-build
      
      - name: Deploy to production
        run: echo "Deploying version ${{ needs.frontend.outputs.build_version }} to production...."